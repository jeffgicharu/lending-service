apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: lending-service-alerts
  labels:
    release: prometheus
spec:
  groups:
    - name: lending-service.rules
      rules:
        - alert: HighErrorRate
          expr: rate(http_server_requests_seconds_count{application="lending-service",status=~"5.."}[5m]) > 0.1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "High 5xx error rate on lending-service"
        - alert: HighLatency
          expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket{application="lending-service"}[5m])) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "P95 latency above 2s on lending-service"
        - alert: ServiceDown
          expr: up{job="lending-service"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "lending-service is down"
